<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#2435d6" />
<title>Loop · Campus Token Economy</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <radialGradient id="coinFace" cx="38%" cy="32%" r="75%">
    <stop offset="0" stop-color="#ffffff"/><stop offset="45%" stop-color="#e9ecf3"/><stop offset="100%" stop-color="#b9c0cf"/>
  </radialGradient>
  <linearGradient id="coinRim" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#d7dce6"/><stop offset="50%" stop-color="#9aa2b4"/><stop offset="100%" stop-color="#7d8597"/>
  </linearGradient>
</defs></svg>

<div class="stage">
  <div class="brand-aside" aria-hidden="true">
    <div class="brand-aside__mark">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
        <rect x="3" y="3" width="42" height="42" rx="13" fill="currentColor"/>
        <circle cx="24" cy="20" r="7" fill="#fff"/>
        <path d="M14 36c0-5.5 4.5-9 10-9s10 3.5 10 9" stroke="#fff" stroke-width="3.4" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 class="brand-aside__title">loop</h1>
    <p class="brand-aside__tag">Campus Token Economy</p>
    <p class="brand-aside__loop">Help · Earn · Spend</p>
    <p class="brand-aside__hint">Tap a task, take it, spend your tokens on campus.</p>
    <p class="brand-aside__team">Bar-Ilan University · MVP demo</p>
  </div>

  <div class="phone" id="phone">
    <div class="phone__notch"></div>
    <div class="phone__screen" id="screen">
      <div class="statusbar">
        <span class="statusbar__time">10:51</span>
        <span class="statusbar__icons">
          <svg width="17" height="11" viewBox="0 0 17 11" fill="none"><rect x="0" y="6" width="3" height="5" rx="1" fill="currentColor"/><rect x="4.5" y="4" width="3" height="7" rx="1" fill="currentColor"/><rect x="9" y="2" width="3" height="9" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="3" height="11" rx="1" fill="currentColor"/></svg>
          <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><path d="M8 2.5C5.2 2.5 2.7 3.6.9 5.4l1.4 1.4C3.8 5.3 5.8 4.5 8 4.5s4.2.8 5.7 2.3l1.4-1.4C13.3 3.6 10.8 2.5 8 2.5z" fill="currentColor"/><path d="M8 6.5c-1.2 0-2.3.5-3.1 1.3L8 11l3.1-3.2C10.3 7 9.2 6.5 8 6.5z" fill="currentColor"/></svg>
          <span class="statusbar__batt"><i></i></span>
        </span>
      </div>
      <main class="view" id="view"></main>
      <nav class="tabbar" id="tabbar">
        <button class="tab" data-tab="home" aria-label="Home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg></button>
        <button class="tab" data-tab="create" aria-label="Create task"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M5 4h11l3 3v13H5z"/><path d="M9 11h6M9 15h4"/></svg></button>
        <button class="tab" data-tab="spend" aria-label="Spend tokens"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="7" cy="7" r="2.4"/><circle cx="17" cy="17" r="2.4"/><path d="M19 5 5 19"/></svg></button>
        <button class="tab" data-tab="profile" aria-label="Profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6.5 8-6.5s8 2.5 8 6.5"/></svg></button>
      </nav>
    </div>
    <div class="toast" id="toast"></div>
    <div class="modal" id="modal" aria-hidden="true">
      <div class="modal__backdrop" id="modalBack"></div>
      <div class="modal__panel" id="modalPanel" role="dialog" aria-modal="true"></div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
